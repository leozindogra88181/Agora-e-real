<body oncontextmenu="return false;">

<!-- ================= LOBBY DE MENUS ================= -->

<!-- ================= LÓGICA DO JOGO (JAVASCRIPT) ================= -->
<script>
    // --- GERENCIAMENTO DE MENUS ---
    let myName = "";
    let enemyName = "";

    function showPanel(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById(id).classList.add('active-panel');
        document.getElementById('create-status').innerText = "";
        document.getElementById('join-status').innerText = "";
    }

    function saveNick() {
        let nick = document.getElementById('nick-input').value.trim().toUpperCase();
        const status = document.getElementById('nick-status');
        if(nick.length < 2) { 
            status.innerText = "NOME PRECISA TER NO MÍNIMO 2 LETRAS!"; 
            status.style.color = "#ef5350";
            return; 
        }
        myName = nick;
        document.getElementById('display-my-nick').innerText = myName;
        status.innerText = "";
        showPanel('panel-main'); 
    }

    function cancelRoom() {
        if(peer) peer.destroy(); 
        showPanel('panel-main');
    }

    // --- SISTEMA MULTIPLAYER (PEERJS) ---
    let peer, conn, isHost = false, gameStarted = false;
    let gameLoopRef;

    function createRoom() {
        let roomName = document.getElementById('create-room-input').value.trim().toUpperCase();
        const status = document.getElementById('create-status');
        if(!roomName) { status.innerText = "DIGITE UM NOME PARA A SALA!"; return; }
        
        status.innerText = "Criando servidor...";
        
        if(peer) peer.destroy();
        peer = new Peer("clb-" + roomName.toLowerCase()); // ID único da sala

        peer.on('open', () => {
            showPanel('panel-waiting-room');
            document.getElementById('room-name-display').innerText = roomName;
            document.getElementById('slot-name-1').innerText = myName + " (VOCÊ)";
            document.getElementById('slot-p2').innerHTML = '<span class="dot dot-empty"></span> 2. --- <span style="color:#aaa; font-size: 8px;">(AGUARDANDO...)</span>';
            document.getElementById('btn-start-game').style.display = 'none';
            document.getElementById('waiting-status').innerText = "Servidor Aberto! Passe o nome da sala pro seu amigo.";
        });

        peer.on('connection', c => { 
            c.on('open', () => {
                const guestName = c.metadata ? c.metadata.pName : "PLAYER 2";
                
                if(guestName === myName) {
                    c.send({ cmd: 'ERROR_NAME' });
                    setTimeout(() => c.close(), 500); 
                } else {
                    conn = c; 
                    isHost = true; 
                    enemyName = guestName;
                    
                    // Configuração da Sala Pronta
                    document.getElementById('slot-p2').innerHTML = `<span class="dot dot-red"></span> 2. <span style="color:#ef5350;">${enemyName}</span> <span style="color:#4caf50; font-size: 8px;">(CONECTADO)</span>`;
                    document.getElementById('waiting-status').innerText = "Desafiante pronto! Pode iniciar a partida.";
                    document.getElementById('btn-start-game').style.display = 'block'; 
                    
                    conn.send({ cmd: 'WELCOME', hostName: myName }); 
                    
                    // Recebe comandos do Client (P2)
                    conn.on('data', d => {
                        if (gameStarted) rInput = d; 
                    });
                    
                    conn.on('close', connectionLost);
                }
            });
        });
        
        peer.on('error', err => {
            status.innerText = "ESTE NOME DE SALA JÁ ESTÁ EM USO!";
            status.style.color = "#ef5350";
        });
    }

    function joinRoom() {
        const roomName = document.getElementById('join-room-input').value.trim().toLowerCase();
        const status = document.getElementById('join-status');
        if(!roomName) { status.innerText = "DIGITE O NOME DA SALA!"; return; }
        
        status.innerText = "Buscando servidor...";
        status.style.color = "#ffeb3b";
        
        if(peer) peer.destroy();
        peer = new Peer();

        peer.on('open', () => {
            // reliable: false para otimizar velocidade em jogos de ação
            conn = peer.connect("clb-" + roomName, { metadata: { pName: myName }, reliable: false });
            
            conn.on('open', () => {
                isHost = false;
                
                conn.on('data', d => {
                    if(d.cmd === 'ERROR_NAME') {
                        status.innerText = "NICKNAME IGUAL AO DO HOST! MUDE SEU NOME.";
                        status.style.color = "#ef5350";
                        conn.close();
                    } 
                    else if(d.cmd === 'WELCOME') {
                        enemyName = d.hostName;
                        showPanel('panel-waiting-room');
                        document.getElementById('room-name-display').innerText = roomName.toUpperCase();
                        document.getElementById('slot-name-1').innerText = enemyName + " (HOST)";
                        document.getElementById('slot-p2').innerHTML = `<span class="dot dot-red"></span> 2. <span style="color:#ef5350;">${myName} (VOCÊ)</span>`;
                        document.getElementById('waiting-status').innerText = "Aguardando o Host iniciar a partida...";
                        document.getElementById('btn-start-game').style.display = 'none'; 
                    }
                    else if(d.cmd === 'START_MATCH') {
                        startMatch();
                    } 
                    else if (gameStarted) {
                        gameState = d; // Atualiza a tela com os dados do Servidor
                    }
                });

                conn.on('close', connectionLost);
            });
            conn.on('error', () => { status.innerText = "SALA FECHADA OU CHEIA."; status.style.color = "#ef5350"; });
        });
        peer.on('error', () => { status.innerText = "ERRO AO CONECTAR."; status.style.color = "#ef5350"; });
    }

    function connectionLost() {
        if(gameStarted) {
            cancelAnimationFrame(gameLoopRef);
            document.getElementById('error-msg').innerText = "A conexão com o outro jogador foi perdida.";
            document.getElementById('error-overlay').style.display = 'flex';
        } else { 
            alert("O outro jogador saiu da sala."); 
            location.reload(); 
        }
    }

    function startGameCmd() {
        if(conn && conn.open) {
            conn.send({ cmd: 'START_MATCH' }); 
            startMatch();
        }
    }

    // --- MECÂNICA E FÍSICA DO JOGO ---
    function startMatch() {
        document.getElementById('lobby-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        gameStarted = true;
        
        // Define nomes no placar
        if(isHost) {
            document.getElementById('nameL').innerText = myName;
            document.getElementById('nameR').innerText = enemyName;
        } else {
            document.getElementById('nameL').innerText = enemyName;
            document.getElementById('nameR').innerText = myName;
        }

        updateSize();
        if(isHost) gameLoopRef = requestAnimationFrame(hostLoop);
        else gameLoopRef = requestAnimationFrame(clientLoop);
    }

    const WORLD_W = 2400, WORLD_H = 1400, GOAL_H = 350, P_RADIUS = 35, B_RADIUS = 20;
    const ACCEL = 0.45, MAX_SPEED = 6.0, FRICTION = 0.94, BALL_FRICTION = 0.985, KICK_POWER = 20;

    const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
    
    let lInput = { x: 0, y: 0, k: false, r: 0 }; 
    let rInput = { x: 0, y: 0, k: false, r: 0 }; 
    let gameState = null; 
    
    let p1 = { x: 450, y: WORLD_H/2, vx: 0, vy: 0 }; 
    let p2 = { x: 1950, y: WORLD_H/2, vx: 0, vy: 0 }; 
    let ball = { x: 1200, y: WORLD_H/2, vx: 0, vy: 0 };
    let score = { l: 0, r: 0 }; 
    let cam = { x: 1200, y: WORLD_H/2 };

    function updateScoreUI(sl, sr) {
        document.getElementById('sL').innerText = sl.toString().padStart(2,'0');
        document.getElementById('sR').innerText = sr.toString().padStart(2,'0');
    }

    function moveEnt(e, input) {
        // Movimento
        e.vx += input.x * ACCEL; e.vy += input.y * ACCEL;
        let speed = Math.sqrt(e.vx*e.vx + e.vy*e.vy);
        if(speed > MAX_SPEED) { e.vx = (e.vx/speed) * MAX_SPEED; e.vy = (e.vy/speed) * MAX_SPEED; }
        e.x += e.vx; e.y += e.vy;
        e.vx *= FRICTION; e.vy *= FRICTION;

        // Limites do Campo
        if(e.x < P_RADIUS) e.x = P_RADIUS; if(e.x > WORLD_W-P_RADIUS) e.x = WORLD_W-P_RADIUS;
        if(e.y < P_RADIUS) e.y = P_RADIUS; if(e.y > WORLD_H-P_RADIUS) e.y = WORLD_H-P_RADIUS;
        
        // Chute e Condução de bola
        const dx = ball.x - e.x, dy = ball.y - e.y, dist = Math.sqrt(dx*dx+dy*dy);
        if(input.k && dist < 85) { // Área de chute levemente maior
            ball.x
