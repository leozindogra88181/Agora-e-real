<body>

<!-- TELA DE MENU (LOBBY) -->
<div id="lobby-screen">
    <div class="title">MAMOBALL<br>ONLINE</div>
    
    <!-- Painel Inicial -->
    <div id="panel-main" class="panel active-panel">
        <button class="btn btn-blue" id="btn-create-room">CRIAR SALA (AZUL)</button>
        <button class="btn btn-red" id="btn-show-join">ENTRAR (VERMELHO)</button>
        <div class="status-box" id="main-status">Certifique-se de ter internet boa.</div>
    </div>

    <!-- Painel do Criador da Sala (Host) -->
    <div id="panel-host" class="panel">
        <p style="font-size: 12px; color: #aaa;">Seu código é:</p>
        <h1 id="room-code-display" style="color: #42a5f5; font-size: 36px; letter-spacing: 5px; margin: 20px 0;">...</h1>
        <div class="status-box" id="host-status">Iniciando servidor...</div>
        <button class="btn" id="btn-back-host" style="margin-top: 10px;">CANCELAR</button>
    </div>

    <!-- Painel de quem vai Entrar (Client) -->
    <div id="panel-join" class="panel">
        <p style="font-size: 12px; color: #aaa; margin-bottom: 20px;">Digite o código do amigo:</p>
        <input type="text" id="room-input" maxlength="4" placeholder="EX: A1B2" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="btn btn-red" id="btn-join-room">CONECTAR</button>
        <div class="status-box" id="join-status"></div>
        <button class="btn" id="btn-back-join" style="margin-top: 10px;">VOLTAR</button>
    </div>
</div>

<!-- TELA DO JOGO (GAME) -->
<div id="game-screen">
    <div id="ui">
        <div class="score-board">
            <span id="score-left" style="color: #42a5f5;">00</span>
            <span style="opacity: 0.3;">:</span>
            <span id="score-right" style="color: #ef5350;">00</span>
        </div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <div id="kick-btn">X</div>
</div>

<script>
    // ==========================================
    // SISTEMA DE NAVEGAÇÃO DO MENU (BLINDADO)
    // ==========================================
    const lobbyScreen = document.getElementById('lobby-screen');
    const gameScreen = document.getElementById('game-screen');
    const roomInput = document.getElementById('room-input');
    
    function switchPanel(panelId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById(panelId).classList.add('active-panel');
    }

    // Botões do Menu Principal
    document.getElementById('btn-create-room').addEventListener('click', () => {
        switchPanel('panel-host');
        startHostServer();
    });
    
    document.getElementById('btn-show-join').addEventListener('click', () => {
        switchPanel('panel-join');
        document.getElementById('join-status').innerText = "";
        roomInput.value = "";
    });

    // Botões de Voltar
    document.getElementById('btn-back-host').addEventListener('click', () => {
        if(peer) peer.destroy(); // Derruba servidor se desistir
        switchPanel('panel-main');
    });
    document.getElementById('btn-back-join').addEventListener('click', () => {
        if(peer) peer.destroy();
        switchPanel('panel-main');
    });

    // Botão de Conectar
    document.getElementById('btn-join-room').addEventListener('click', () => {
        connectToHost();
    });

    function generateCode() {
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // Removido O, 0, 1, I para evitar confusão visual
        let code = "";
        for(let i=0; i<4; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
        return code;
    }

    // ==========================================
    // LÓGICA DE MULTIPLAYER (PEERJS)
    // ==========================================
    let peer = null;
    let conn = null;
    let isHost = false;
    let gameStarted = false;

    // Verificar se o PeerJS carregou corretamente
    if (typeof Peer === 'undefined') {
        document.getElementById('main-status').innerText = "Erro Crítico: Falha ao carregar biblioteca online. Desative o adblock ou recarregue a página.";
        document.getElementById('main-status').style.color = "#ef5350";
        document.getElementById('btn-create-room').disabled = true;
        document.getElementById('btn-show-join').disabled = true;
    }

    function startHostServer() {
        const hostStatus = document.getElementById('host-status');
        hostStatus.innerText = "Conectando aos servidores globais...";
        
        if(peer) peer.destroy();
        
        const rawCode = generateCode();
        const fullRoomId = "mbgame-" + rawCode.toLowerCase(); // Letras minúsculas pro sistema
        
        peer = new Peer(fullRoomId, { debug: 1 }); // Cria o servidor
        
        peer.on('open', id => {
            document.getElementById('room-code-display').innerText = rawCode;
            hostStatus.innerText = "Sala pronta! Mande o código acima para seu amigo e espere ele entrar.";
            isHost = true;
        });

        peer.on('connection', connection => {
            hostStatus.innerText = "Amigo encontrado! Iniciando partida...";
            conn = connection;
            setupGameConnection();
        });

        peer.on('error', err => {
            console.error(err);
            hostStatus.innerText = "Erro de rede. Clique em CANCELAR e tente criar a sala novamente.";
            hostStatus.style.color = "#ef5350";
        });
    }

    function connectToHost() {
        const joinStatus = document.getElementById('join-status');
        let code = roomInput.value.trim().toLowerCase(); // Transforma pra minuscula
        
        if(code.length !== 4) {
            joinStatus.innerText = "O código precisa ter exatamente 4 letras/números.";
            return;
        }

        joinStatus.innerText = "Procurando sala...";
        joinStatus.style.color = "#ffeb3b";
        
        if(peer) peer.destroy();
        peer = new Peer({ debug: 1 }); // Cliente com ID aleatório

        peer.on('open', id => {
            joinStatus.innerText = "Conectando ao jogador Azul...";
            const hostId = "mbgame-" + code;
            
            conn = peer.connect(hostId, { reliable: true });
            
            conn.on('open', () => {
                isHost = false;
                setupGameConnection();
            });

            conn.on('error', err => {
                joinStatus.innerText = "A conexão falhou ou caiu.";
            });
        });

        peer.on('error', err => {
             console.error(err);
             if(err.type === 'peer-unavailable') {
                 joinStatus.innerText = "Sala não encontrada! Verifique se o código está certo e se o Azul já criou a sala.";
             } else {
                 joinStatus.innerText = "Erro ao conectar. Tente novamente.";
             }
             joinStatus.style.color = "#ef5350";
        });
    }

    function setupGameConnection() {
        // ESCONDE O LOBBY E MOSTRA O JOGO
        lobbyScreen.style.display = 'none';
        gameScreen.style.display = 'block';
        gameStarted = true;
        
        // Listener de dados recebidos
        conn.on('data', data => {
            if(isHost) {
                remoteInputs = data; // Host recebe controle
            } else {
                gameState = data;    // Cliente recebe tela
                applyGameState();
            }
        });

        conn.on('close', () => {
            alert("A conexão com o outro jogador caiu! A partida terminou.");
            location.reload();
        });

        // Inicia o Loop de Desenho
        if(isHost) gameLoop();
        else clientRenderLoop();
    }

    // ==========================================
    // MOTOR DO JOGO E CONTROLES (FÍSICA INTACTA)
    // ==========================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreLeftEl = document.getElementById('score-left');
    const scoreRightEl = document.getElementById('score-right');
    const joystickKnob = document.getElementById('joystick-knob');
    const joystickContainer = document.getElementById('joystick-container');
    const kickBtn = document.getElementById('kick-btn');

    const WORLD_WIDTH = 2400;
    const WORLD_HEIGHT = 1400;
    const GOAL_SIZE = 280;
    const CAMERA_ZOOM = 0.65;

    const FRICTION = 0.98;
    const BALL_FRICTION = 0.993;
    const PLAYER_ACCEL = 0.52;
    const MAX_SPEED = 6.5;
    const KICK_POWER = 22;
    const DRIBBLING_THRESHOLD = 65;

    let camera = { x: 0, y: 0, width: 0, height: 0 };
    let score = { left: 0, right: 0 };
    
    // Inputs
    let localInput = { x: 0, y: 0, kick: false, wasKick: false, rot: 0 };
    let remoteInputs = { x: 0, y: 0, kick: false, rot: Math.PI };
    let gameState = null;
    let isTouchingJoystick = false;

    function updateCanvasSize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        camera.width = canvas.width / CAMERA_ZOOM;
        camera.height = canvas.height / CAMERA_ZOOM;
    }
    window.addEventListener('resize', updateCanvasSize);
    updateCanvasSize();

    // Controles Touch Seguros
    const updateJoystick = (clientX, clientY) => {
        const rect = joystickContainer.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        let dx = clientX - centerX;
        let dy = clientY - centerY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const maxR = rect.width / 2;
        
        if (dist > maxR) { dx = (dx / dist) * maxR; dy = (dy / dist) * maxR; }

        if (dist < 8) {
            localInput.x = 0; localInput.y = 0;
            joystickKnob.style.transform = `translate(-50%, -50%)`;
        } else {
            localInput.x = dx / maxR;
            localInput.y = dy / maxR;
            joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            localInput.rot = Math.atan2(dy, dx);
        }
    };

    joystickContainer.addEventListener('touchstart', (e) => {
        isTouchingJoystick = true; updateJoystick(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    joystickContainer.addEventListener('touchmove', (e) => {
        if (isTouchingJoystick) { updateJoystick(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }
    }, { passive: false });

    const stopJoystick = () => {
        isTouchingJoystick = false; localInput.x = 0; localInput.y = 0;
        joystickKnob.style.transform = `translate(-50%, -50%)`;
    };
    joystickContainer.addEventListener('touchend', stopJoystick);
    joystickContainer.addEventListener('touchcancel', stopJoystick);

    kickBtn.addEventListener('touchstart', (e) => { localInput.kick = true; e.preventDefault(); });
    kickBtn.addEventListener('touchend', (e) => { localInput.kick = false; e.preventDefault(); });
    kickBtn.addEventListener('touchcancel', (e) => { localInput.kick = false; e.preventDefault(); });

    // Envio de Dados pela Rede (Ajustado para performance)
    setInterval(() => {
        if(!gameStarted || !conn || !conn.open) return;
        if(isHost) {
            // Empacota tudo para enviar ao Cliente Vermelho
            conn.send({
                p1x: player1.x, p1y: player1.y, p1r: localInput.rot, p1k: localInput.kick,
                p2x: player2.x, p2y: player2.y, p2r: remoteInputs.rot, p2k: remoteInputs.kick,
                bx: ball.x, by: ball.y, sl: score.left, sr: score.right
            });
        } else {
            // Cliente só envia o joystick e botão
            conn.send({ x: localInput.x, y: localInput.y, kick: localInput.kick, rot: localInput.rot });
        }
    }, 16); // ~60 FPS update rate

    class Entity {
        constructor(x, y, radius, color, isBall = false) {
            this.x = x; this.y = y; this.radius = radius; this.color = color;
            this.vx = 0; this.vy = 0; this.isBall = isBall;
        }
        draw(kickingNow = false, rotation = 0) {
            ctx.save();
            ctx.translate(this.x, this.y);
            
            if (!this.isBall && kickingNow) {
                ctx.beginPath(); ctx.arc(0, 0, this.radius + 10, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2; ctx.stroke();
            }

            ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 3; ctx.stroke();
            
            if (!this.isBall) {
                ctx.rotate(rotation);
                ctx.beginPath(); ctx.moveTo(this.radius - 5, -5);
                ctx.lineTo(this.radius + 5, 0); ctx.lineTo(this.radius - 5, 5);
                ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
            }
            ctx.restore();
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.vx *= this.isBall ? BALL_FRICTION : FRICTION; this.vy *= this.isBall ? BALL_FRICTION : FRICTION;

            const halfGoal = GOAL_SIZE / 2; const midH = WORLD_HEIGHT / 2;
            if (this.x - this.radius < 0) {
                if (this.y > midH - halfGoal && this.y < midH + halfGoal) { if (this.isBall) goalScored('right'); } 
                else { this.x = this.radius; this.vx *= -0.7; }
            }
            if (this.x + this.radius > WORLD_WIDTH) {
                if (this.y > midH - halfGoal && this.y < midH + halfGoal) { if (this.isBall) goalScored('left'); } 
                else { this.x = WORLD_WIDTH - this.radius; this.vx *= -0.7; }
            }
            if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -0.7; }
            if (this.y + this.radius > WORLD_HEIGHT) { this.y = WORLD_HEIGHT - this.radius; this.vy *= -0.7; }
        }
    }

    const player1 = new Entity(400, WORLD_HEIGHT / 2, 34, '#42a5f5');
    const player2 = new Entity(WORLD_WIDTH - 400, WORLD_HEIGHT / 2, 34, '#ef5350');
    const ball = new Entity(WORLD_WIDTH / 2, WORLD_HEIGHT / 2, 18, '#ffffff', true);

    function applyGameState() {
        if(!gameState) return;
        player1.x = gameState.p1x; player1.y = gameState.p1y;
        player2.x = gameState.p2x; player2.y = gameState.p2y;
        ball.x = gameState.bx; ball.y = gameState.by;
        if(score.left !== gameState.sl || score.right !== gameState.sr) {
            score.left = gameState.sl; score.right = gameState.sr;
            scoreLeftEl.innerText = score.left.toString().padStart(2, '0');
            scoreRightEl.innerText = score.right.toString().padStart(2, '0');
        }
    }

    function handleEntityControl(ent, inputData, wasKickingState) {
        const dx = ball.x - ent.x; const dy = ball.y - ent.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        let pressing = inputData.kick;
        let rot = inputData.rot;

        if (pressing && dist < DRIBBLING_THRESHOLD) {
            const targetX = ent.x + Math.cos(rot) * (ent.radius + ball.radius + 2);
            const targetY = ent.y + Math.sin(rot) * (ent.radius + ball.radius + 2);
            ball.x += (targetX - ball.x) * 0.45; ball.y += (targetY - ball.y) * 0.45;
