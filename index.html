<body>

        <div class="status-box" id="join-status"></div>

<script>
    // --- VARIÁVEIS DO MENU ---
    let myName = "";
    let enemyName = "";

    function showPanel(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById(id).classList.add('active-panel');
        document.getElementById('create-status').innerText = "";
        document.getElementById('join-status').innerText = "";
    }

    function saveNick() {
        let nick = document.getElementById('nick-input').value.trim().toUpperCase();
        const status = document.getElementById('nick-status');
        if(nick.length < 2) { 
            status.innerText = "NOME DEVE TER PELO MENOS 2 LETRAS!"; 
            status.style.color = "#ef5350";
            return; 
        }
        myName = nick;
        document.getElementById('display-my-nick').innerText = myName;
        status.innerText = "";
        showPanel('panel-main');
    }

    function cancelRoom() {
        if(peer) peer.destroy(); 
        showPanel('panel-main');
    }

    // --- LÓGICA DO SERVIDOR/SALA (PEERJS) ---
    let peer, conn, isHost = false, gameStarted = false;

    function createRoom() {
        let roomName = document.getElementById('create-room-input').value.trim().toUpperCase();
        const status = document.getElementById('create-status');
        if(!roomName) { status.innerText = "DIGITE UM NOME PARA A SALA!"; return; }
        
        status.innerText = "A criar sala...";
        
        if(peer) peer.destroy();
        peer = new Peer("clb-" + roomName.toLowerCase());

        peer.on('open', () => {
            showPanel('panel-waiting-room');
            document.getElementById('room-name-display').innerText = roomName;
            document.getElementById('slot-name-1').innerText = myName;
            document.getElementById('slot-p2').innerHTML = '<span class="dot dot-empty"></span> 2. --- <br><span style="color:#aaa; font-size: 8px; margin-top:5px;">(AGUARDANDO...)</span>';
            document.getElementById('btn-start-game').style.display = 'none';
            document.getElementById('waiting-status').innerText = "Servidor Aberto! Avisa o teu amigo para entrar na sala: " + roomName;
        });

        peer.on('connection', c => { 
            c.on('open', () => {
                const guestName = c.metadata ? c.metadata.pName : "PLAYER 2";
                
                if(guestName === myName) {
                    c.send({ cmd: 'ERROR_NAME' });
                    setTimeout(() => c.close(), 500); 
                } else {
                    conn = c; 
                    isHost = true; 
                    enemyName = guestName;
                    setupHostLobby();
                    conn.send({ cmd: 'WELCOME', hostName: myName }); 
                }
            });
        });
        
        peer.on('error', err => {
            status.innerText = "ESTE NOME DE SALA JÁ ESTÁ EM USO!";
            status.style.color = "#ef5350";
        });
    }

    function setupHostLobby() {
        document.getElementById('slot-p2').innerHTML = `<span class="dot dot-red"></span> 2. <span style="color:#ef5350;">${enemyName}</span> <br><span style="color:#4caf50; font-size: 8px; margin-top:5px;">(LIGADO!)</span>`;
        document.getElementById('waiting-status').innerText = "Desafiante pronto!";
        document.getElementById('btn-start-game').style.display = 'block'; 
        
        conn.on('data', d => {
            if (gameStarted) rInput = d; 
        });
        
        conn.on('close', () => {
            if(gameStarted) {
                document.getElementById('error-msg').innerText = `O jogador ${enemyName} desligou-se.`;
                document.getElementById('error-overlay').style.display = 'flex';
            } else { 
                alert(enemyName + " saiu da sala."); location.reload(); 
            }
        });
    }

    function startGameCmd() {
        if(conn && conn.open) {
            conn.send({ cmd: 'START_MATCH' }); 
            startMatch();
        }
    }

    function joinRoom() {
        const roomName = document.getElementById('join-room-input').value.trim().toLowerCase();
        const status = document.getElementById('join-status');
        if(!roomName) { status.innerText = "DIGITE O NOME DA SALA!"; return; }
        
        status.innerText = "A procurar servidor...";
        status.style.color = "#ffeb3b";
        
        if(peer) peer.destroy();
        peer = new Peer();

        peer.on('open', () => {
            conn = peer.connect("clb-" + roomName, { metadata: { pName: myName }, reliable: true });
            
            conn.on('open', () => {
                isHost = false;
                
                conn.on('data', d => {
                    if(d.cmd === 'ERROR_NAME') {
                        status.innerText = "NICKNAME JÁ EM USO! MUDA O TEU NICK.";
                        status.style.color = "#ef5350";
                        conn.close();
                    } 
                    else if(d.cmd === 'WELCOME') {
                        enemyName = d.hostName;
                        showPanel('panel-waiting-room');
                        document.getElementById('room-name-display').innerText = roomName.toUpperCase();
                        document.getElementById('slot-name-1').innerText = enemyName;
                        document.getElementById('slot-p2').innerHTML = `<span class="dot dot-red"></span> 2. <span style="color:#ef5350;">${myName}</span> <br><span style="color:#4caf50; font-size: 8px; margin-top:5px;">(PRONTO)</span>`;
                        document.getElementById('waiting-status').innerText = "Aguardar o anfitrião iniciar a partida...";
                        document.getElementById('btn-start-game').style.display = 'none'; 
                        document.getElementById('btn-cancel-room').innerText = "SAIR";
                    }
                    else if(d.cmd === 'START_MATCH') {
                        startMatch();
                    } 
                    else if (gameStarted) {
                        gameState = d; 
                    }
                });

                conn.on('close', () => {
                    if(gameStarted) {
                        document.getElementById('error-msg').innerText = "O Servidor encerrou a partida.";
                        document.getElementById('error-overlay').style.display = 'flex';
                    } else { 
                        alert("Servidor fechado."); location.reload(); 
                    }
                });
            });
            conn.on('error', () => { status.innerText = "SALA FECHADA OU CHEIA."; status.style.color = "#ef5350"; });
        });
        peer.on('error', () => { status.innerText = "SALA NÃO ENCONTRADA."; status.style.color = "#ef5350"; });
    }

    // --- INICIO DO JOGO ---
    function startMatch() {
        document.getElementById('lobby-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        gameStarted = true;
        
        if(isHost) {
            document.getElementById('nameL').innerText = myName;
            document.getElementById('nameR').innerText = enemyName;
        } else {
            document.getElementById('nameL').innerText = enemyName;
            document.getElementById('nameR').innerText = myName;
        }

        updateSize();
        if(isHost) requestAnimationFrame(hostLoop);
        else requestAnimationFrame(clientLoop);
    }

    // --- FÍSICA E JOGO ---
    const WORLD_W = 2400, WORLD_H = 1400, GOAL_H = 300, P_RADIUS = 35, B_RADIUS = 20;
    const ACCEL = 0.38, MAX_SPEED = 5.0, FRICTION = 0.95, BALL_FRICTION = 0.988, KICK_POWER = 18;

    const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
    
    let lInput = { x: 0, y: 0, k: false, r: 0 }; 
    let rInput = { x: 0, y: 0, k: false, r: 0 }; 
    let gameState = null; 
    
    let p1 = { x: 450, y: WORLD_H/2, vx: 0, vy: 0 }; 
    let p2 = { x: 1950, y: WORLD_H/2, vx: 0, vy: 0 }; 
    let ball = { x: 1200, y: WORLD_H/2, vx: 0, vy: 0 };
    let score = { l: 0, r: 0 }; 
    let cam = { x: 1200, y: WORLD_H/2 };

    function updateScoreUI(sl, sr) {
        document.getElementById('sL').innerText = sl.toString().padStart(2,'0');
        document.getElementById('sR').innerText = sr.toString().padStart(2,'0');
    }

    function moveEnt(e, input) {
        e.vx += input.x * ACCEL; e.vy += input.y * ACCEL;
        let speed = Math.sqrt(e.vx*e.vx + e.vy*e.vy);
        if(speed > MAX_SPEED) { e.vx = (e.vx/speed) * MAX_SPEED; e.vy = (e.vy/speed) * MAX_SPEED; }
        e.x += e.vx; e.y += e.vy;
        e.vx *= FRICTION; e.vy *= FRICTION;

        if(e.x < P_RADIUS) e.x = P_RADIUS; if(e.x > WORLD_W-P_RADIUS) e.x = WORLD_W-P_RADIUS;
        if(e.y < P_RADIUS) e.y = P_RADIUS; if(e.y > WORLD_H-P_RADIUS) e.y = WORLD_H-P_RADIUS;
        
        const dx = ball.x - e.x, dy = ball.y - e.y, dist = Math.sqrt(dx*dx+dy*dy);
        if(input.k && dist < 75) {
            ball.x = e.x + Math.cos(input.r) * (P_RADIUS + B_RADIUS + 2);
            ball.y = e.y + Math.sin(input.r) * (P_RADIUS + B_RADIUS + 2);
            ball.vx = e.vx * 1.1; ball.vy = e.vy * 1.1;
        } else if(dist < P_RADIUS + B_RADIUS) {
            let ang = Math.atan2(dy, dx); ball.vx += Math.cos(ang) * 2.5; ball.vy += Math.sin(ang) * 2.5;
        }
    }

    function physics() {
        moveEnt(p1, lInput); 
        moveEnt(p2, rInput);
        
        ball.x += ball.vx; ball.y += ball.vy; 
        ball.vx *= BALL_FRICTION; ball.vy *= BALL_FRICTION;

        const midH = WORLD_H/2, goalHalf = GOAL_H/2;
        if(ball.y < B_RADIUS) { ball.y = B_RADIUS; ball.vy *= -0.7; }
        if(ball.y > WORLD_H-B_RADIUS) { ball.y = WORLD_H-B_RADIUS; ball.vy *= -0.7; }
        
        if(ball.x < B_RADIUS) {
            if(ball.y > midH-goalHalf && ball.y < midH+goalHalf) { score.r++; reset(); } else { ball.x = B_RADIUS; ball.vx *= -0.7; }
        }
        if(ball.x > WORLD_W-B_RADIUS) {
            if(ball.y > midH-goalHalf && ball.y < midH+goalHalf) { score.l++; reset(); } else { ball.x = WORLD_W-B_RADIUS; ball.vx *= -0.7; }
        }

        if(conn && conn.open) {
            conn.send({
                p1: { x: p1.x, y: p1.y, r: lInput.r, k: lInput.k },
                p2: { x: p2.x, y: p2.y, r: rInput.r, k: rInput.k },
                ball: { x: ball.x, y: ball.y },
                score: score
