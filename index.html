<head>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }

        /* MENU INICIAL SEGURO */
        #lobby-screen {
            position: fixed;
            top: 0; left: 0;

        .title {

        .btn {

            z-index: 110; color: #fff; font-size: 32px; touch-action: none;
        }
    </style>
</head>
<body>

<div id="lobby-screen">
    <div class="title">MAMOBALL<br>MULTIPLAYER</div>
    
    <div id="panel-main" class="panel active-panel">
        <div class="btn btn-blue" id="btn-create">CRIAR SALA</div>
        <div class="btn btn-red" id="btn-show-join">ENTRAR</div>
        <div class="status-box" id="main-status">Conecte com seu amigo usando o código.</div>
    </div>

    <div id="panel-host" class="panel">
        <p style="font-size: 10px; color: #aaa;">CÓDIGO DA SALA:</p>
        <h1 id="display-code" style="color:#42a5f5; font-size: 34px; letter-spacing: 4px;">----</h1>
        <div class="status-box" id="host-status">Iniciando...</div>
        <div class="btn" id="btn-cancel-host" style="margin-top: 20px; font-size: 10px; padding: 12px;">CANCELAR</div>
    </div>

    <div id="panel-join" class="panel">
        <p style="font-size: 10px; color: #aaa;">DIGITE O CÓDIGO:</p>
        <input type="text" id="room-input" maxlength="4" placeholder="....">
        <div class="btn btn-red" id="btn-connect">CONECTAR</div>
        <div class="status-box" id="join-status"></div>
        <div class="btn" id="btn-cancel-join" style="margin-top: 10px; font-size: 10px; padding: 12px;">VOLTAR</div>
    </div>
</div>

<div id="game-screen">
    <div id="ui">
        <div class="score-board">
            <span id="sL" style="color:#42a5f5">00</span>
            <span style="opacity:0.5">:</span>
            <span id="sR" style="color:#ef5350">00</span>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <div id="kick-btn">X</div>
</div>

<script>
    // --- CONFIGURAÇÕES DO JOGO (VELOCIDADE REDUZIDA AQUI!) ---
    const WORLD_W = 2400;
    const WORLD_H = 1400;
    const GOAL_H = 300;
    const P_RADIUS = 35;
    const B_RADIUS = 20;
    
    // FISICA AJUSTADA (Mais lento e com mais controle)
    const ACCEL = 0.38;        // Aceleração reduzida
    const MAX_SPEED = 5.0;     // Velocidade Máxima reduzida (antes era 7.5)
    const FRICTION = 0.95;     // Atrito maior para o jogador não patinar
    const BALL_FRICTION = 0.988; 
    const KICK_POWER = 18;     // Chute ligeiramente mais fraco para acompanhar a velocidade

    const lobby = document.getElementById('lobby-screen');
    const gameS = document.getElementById('game-screen');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let peer, conn, isHost = false, gameStarted = false;
    let lInput = { x: 0, y: 0, k: false, r: 0 }, rInput = { x: 0, y: 0, k: false, r: 0 };
    let p1 = { x: 450, y: WORLD_H/2, vx: 0, vy: 0 }, p2 = { x: 1950, y: WORLD_H/2, vx: 0, vy: 0 }, ball = { x: 1200, y: WORLD_H/2, vx: 0, vy: 0 };
    let score = { l: 0, r: 0 };
    let cam = { x: 1200, y: WORLD_H/2 };

    // --- SISTEMA DE CLIQUE ---
    function bind(id, fn) {
        const el = document.getElementById(id);
        const handle = (e) => { e.preventDefault(); fn(); };
        el.addEventListener('click', handle);
        el.addEventListener('touchstart', handle);
    }

    bind('btn-create', () => { showP('panel-host'); initHost(); });
    bind('btn-show-join', () => { showP('panel-join'); });
    bind('btn-cancel-host', () => { if(peer) peer.destroy(); showP('panel-main'); });
    bind('btn-cancel-join', () => { showP('panel-main'); });
    bind('btn-connect', () => { initJoin(); });

    function showP(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById(id).classList.add('active-panel');
    }

    // --- MULTIPLAYER ---
    function initHost() {
        const code = Math.random().toString(36).substring(2,6).toUpperCase().replace(/[01OI]/g, 'X');
        document.getElementById('display-code').innerText = code;
        if(peer) peer.destroy();
        peer = new Peer("mamo-" + code.toLowerCase());
        peer.on('open', () => document.getElementById('host-status').innerText = "Aguardando jogador vermelho...");
        peer.on('connection', c => { conn = c; isHost = true; startMatch(); });
    }

    function initJoin() {
        const code = document.getElementById('room-input').value.trim().toLowerCase();
        if(!code) return;
        document.getElementById('join-status').innerText = "Localizando sala...";
        if(peer) peer.destroy();
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect("mamo-" + code);
            conn.on('open', () => { isHost = false; startMatch(); });
            conn.on('error', () => document.getElementById('join-status').innerText = "Erro: Sala não existe.");
        });
    }

    function startMatch() {
        lobby.style.display = 'none';
        gameS.style.display = 'block';
        gameStarted = true;
        updateSize();
        
        conn.on('data', d => {
            if(isHost) rInput = d;
            else { p1 = d.p1; p2 = d.p2; ball = d.ball; score = d.score; updateScoreUI(); }
        });

        if(isHost) requestAnimationFrame(hostLoop);
        else requestAnimationFrame(clientLoop);
    }

    function updateScoreUI() {
        document.getElementById('sL').innerText = score.l.toString().padStart(2,'0');
        document.getElementById('sR').innerText = score.r.toString().padStart(2,'0');
    }

    // --- FISICA ---
    function moveEnt(e, input) {
        e.vx += input.x * ACCEL; 
        e.vy += input.y * ACCEL;
        
        // Limita a velocidade do jogador (Foi adicionado para evitar que corram muito rápido)
        let speed = Math.sqrt(e.vx*e.vx + e.vy*e.vy);
        if(speed > MAX_SPEED) {
            e.vx = (e.vx/speed) * MAX_SPEED;
            e.vy = (e.vy/speed) * MAX_SPEED;
        }

        e.x += e.vx; e.y += e.vy;
        e.vx *= FRICTION; e.vy *= FRICTION;

        // Borda do campo
        if(e.x < P_RADIUS) e.x = P_RADIUS; if(e.x > WORLD_W-P_RADIUS) e.x = WORLD_W-P_RADIUS;
        if(e.y < P_RADIUS) e.y = P_RADIUS; if(e.y > WORLD_H-P_RADIUS) e.y = WORLD_H-P_RADIUS;
        
        // Drible Seguro e Controle de Bola
        const dx = ball.x - e.x, dy = ball.y - e.y, dist = Math.sqrt(dx*dx+dy*dy);
        if(input.k && dist < 75) {
            ball.x = e.x + Math.cos(input.r) * (P_RADIUS + B_RADIUS + 2);
            ball.y = e.y + Math.sin(input.r) * (P_RADIUS + B_RADIUS + 2);
            ball.vx = e.vx * 1.1; ball.vy = e.vy * 1.1;
        } else if(dist < P_RADIUS + B_RADIUS) {
            let ang = Math.atan2(dy, dx);
            ball.vx += Math.cos(ang) * 2.5; ball.vy += Math.sin(ang) * 2.5;
        }
    }

    function physics() {
        moveEnt(p1, lInput);
        moveEnt(p2, rInput);

        // Movimento da bola
        ball.x += ball.vx; ball.y += ball.vy;
        ball.vx *= BALL_FRICTION; ball.vy *= BALL_FRICTION;

        // Limites da Bola e Gols
        const midH = WORLD_H/2, goalHalf = GOAL_H/2;
        
        // Parede Cima/Baixo
        if(ball.y < B_RADIUS) { ball.y = B_RADIUS; ball.vy *= -0.7; }
        if(ball.y > WORLD_H-B_RADIUS) { ball.y = WORLD_H-B_RADIUS; ball.vy *= -0.7; }
        
        // Parede Esquerda e Gol Esquerdo
        if(ball.x < B_RADIUS) {
            if(ball.y > midH-goalHalf && ball.y < midH+goalHalf) { score.r++; reset(); }
            else { ball.x = B_RADIUS; ball.vx *= -0.7; }
        }
        // Parede Direita e Gol Direito
        if(ball.x > WORLD_W-B_RADIUS) {
            if(ball.y > midH-goalHalf && ball.y < midH+goalHalf) { score.l++; reset(); }
            else { ball.x = WORLD_W-B_RADIUS; ball.vx *= -0.7; }
        }

        // Sincronização da Rede
        conn.send({ p1, p2, ball, score });
        updateScoreUI();
    }

    function reset() {
        p1.x = 450; p1.y = WORLD_H/2; p1.vx = p1.vy = 0;
        p2.x = 1950; p2.y = WORLD_H/2; p2.vx = p2.vy = 0;
        ball.x = 1200; ball.y = WORLD_H/2; ball.vx = ball.vy = 0;
    }

    // --- RENDERING ---
    function drawField() {
        // Gramado
        ctx.fillStyle = '#2e7d32'; ctx.fillRect(0,0,WORLD_W, WORLD_H);
        
        // Linhas de campo
        ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 6;
        ctx.strokeRect(0,0,WORLD_W, WORLD_H); // Borda campo
        ctx.beginPath(); ctx.moveTo(WORLD_W/2, 0); ctx.lineTo(WORLD_W/2, WORLD_H); ctx.stroke(); // Meio
        ctx.beginPath(); ctx.arc(WORLD_W/2, WORLD_H/2, 180, 0, Math.PI*2); ctx.stroke(); // Circulo central
        
        const midH = WORLD_H/2;
        const goalHalf = GOAL_H/2;

        // REDES DOS GOLS (Nova aparência)
        ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; // Fundo da rede transparente
        ctx.fillRect(-60, midH - goalHalf, 60, GOAL_H);
        ctx.fillRect(WORLD_W, midH - goalHalf, 60, GOAL_H);

        // Desenhar a grade da rede
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for(let i=10; i<GOAL_H; i+=20) {
            ctx.moveTo(-60, midH - goalHalf + i); ctx.lineTo(0, midH - goalHalf + i);
            ctx.moveTo(WORLD_W, midH - goalHalf + i); ctx.lineTo(WORLD_W+60, midH - goalHalf + i);
        }
        ctx.stroke();

        // Traves sólidas brancas
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 8;
        ctx.strokeRect(-60, midH - goalHalf, 60, GOAL_H);
        ctx.strokeRect(WORLD_W, midH - goalHalf, 60, GOAL_H);
    }

    function draw() {
        ctx.setTransform(1,0,0,1,0,0);
        ctx.clearRect(0,0,canvas.width,canvas.height);
        
        const myP = isHost ? p1 : p2;
        cam.x += (myP.x - cam.x) * 0.1;
        cam.y += (myP.y - cam.y) * 0.1;
        
        const zoom = 0.65;
        ctx.scale(zoom, zoom);
        ctx.translate(-cam.x + (canvas.width/2)/zoom, -cam.y + (canvas.height/2)/zoom);

        drawField();

        // Players e Bola
        drawCirc(p1.x, p1.y, P_RADIUS, '#42a5f5', lInput.r);
        drawCirc(p2.x, p2.y, P_RADIUS, '#ef5350', isHost ? rInput.r : rInput.r);
        drawCirc(ball.x, ball.y, B_RADIUS, '#fff', 0, true);
    }

    function drawCirc(x, y, r, c, rot, isBall=false) {
        ctx.save(); ctx.translate(x, y);
        ctx.beginPath(); ctx.arc(0,0,r,0,7);
        ctx.fillStyle = c; ctx.fill(); 
        ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 4; ctx.stroke();
        if(!isBall) {
            ctx.rotate(rot);
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fillRect(r-12, -6, 18, 12);
        }
        ctx.restore();
    }

    function hostLoop() { physics(); draw(); requestAnimationFrame(hostLoop); }
    function clientLoop() { 
        conn.send(lInput); 
        draw(); 
        requestAnimationFrame(clientLoop); 
    }

    // --- CONTROLES DE INTERFACE (MOBILE) ---
    function updateSize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', updateSize);

    const jCont = document.getElementById('joystick-container'), jKnob = document.getElementById('joystick-knob');
    jCont.addEventListener('touchstart', moveJ, {passive:false});
    jCont.addEventListener('touchmove', moveJ, {passive:false});
    jCont.addEventListener('touchend', () => { lInput.x = 0; lInput.y = 0; jKnob.style.transform = 'translate(-50%,-50%)'; });

    function moveJ(e) {
        e.preventDefault();
        const rect = jCont.getBoundingClientRect(), cx = rect.left+rect.width/2, cy = rect.top+rect.height/2;
        const t = e.touches[0];
        let dx = t.clientX - cx, dy = t.clientY - cy, dist = Math.sqrt(dx*dx+dy*dy), max = rect.width/2;
        if(dist > max) { dx *= max/dist; dy *= max/dist; }
        lInput.x = dx/max; lInput.y = dy/max; lInput.r = Math.atan2(dy, dx);
        jKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }

    const kBtn = document.getElementById('kick-btn');
    kBtn.addEventListener('touchstart', (e) => { e.preventDefault(); lInput.k = true; });
    kBtn.addEventListener('touchend', (e) => { e.preventDefault(); lInput.k = false; });
    kBtn.addEventListener('touchcancel', (e) => { e.preventDefault(); lInput.k = false; });
</script>
</body>
</html>
