    <style>
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; /* Remove o brilho chato do iOS ao clicar */
        }
        
        body, html {
            margin: 0; padding: 0;

            background-color: #000;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }

        /* TELA DE MENU - AGORA COM PRIORIDADE MÁXIMA */

        .title {

        }
        
        /* BOTÕES TOTALMENTE CLICÁVEIS */
        .btn {
            background: #222; 
            border: 4px solid #fff; 
            color: #fff;

<body>

<div id="lobby-screen">
    <div class="title">MAMOBALL ONLINE</div>
    
    <!-- Menu Inicial -->
    <div id="panel-main" class="panel active-panel">
        <div class="btn btn-blue" id="btn-create">CRIAR SALA</div>
        <div class="btn btn-red" id="btn-show-join">ENTRAR</div>
        <div class="status-box" id="main-status">Aguardando...</div>
    </div>

    <!-- Criar Sala -->
    <div id="panel-host" class="panel">
        <p style="font-size: 10px;">SEU CÓDIGO:</p>
        <h1 id="display-code" style="color:#42a5f5; font-size: 30px;">----</h1>
        <div class="status-box" id="host-status">Iniciando servidor...</div>
        <div class="btn" id="btn-cancel-host">VOLTAR</div>
    </div>

    <!-- Entrar na Sala -->
    <div id="panel-join" class="panel">
        <p style="font-size: 10px;">CÓDIGO DO AMIGO:</p>
        <input type="text" id="room-input" maxlength="4" placeholder="ABCD">
        <div class="btn btn-red" id="btn-connect">CONECTAR</div>
        <div class="status-box" id="join-status"></div>
        <div class="btn" id="btn-cancel-join">VOLTAR</div>
    </div>
</div>

<div id="game-screen">
    <div id="ui"><div class="score-board"><span id="sL">00</span> : <span id="sR">00</span></div></div>
    <canvas id="gameCanvas"></canvas>
    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <div id="kick-btn">X</div>
</div>

<script>
    // --- NAVEGAÇÃO E EVENTOS ---
    const lobby = document.getElementById('lobby-screen');
    const gameS = document.getElementById('game-screen');
    const mainStatus = document.getElementById('main-status');

    function showP(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById(id).classList.add('active-panel');
    }

    // Função para registrar clique de forma segura em Mobile
    function bindBtn(id, callback) {
        const el = document.getElementById(id);
        el.addEventListener('click', (e) => { e.preventDefault(); callback(); });
        el.addEventListener('touchstart', (e) => { e.preventDefault(); callback(); });
    }

    bindBtn('btn-create', () => { showP('panel-host'); initHost(); });
    bindBtn('btn-show-join', () => { showP('panel-join'); });
    bindBtn('btn-cancel-host', () => { if(peer) peer.destroy(); showP('panel-main'); });
    bindBtn('btn-cancel-join', () => { showP('panel-main'); });
    bindBtn('btn-connect', () => { joinRoom(); });

    // --- MULTIPLAYER CORE ---
    let peer, conn, isHost = false, gameStarted = false;

    function initHost() {
        const code = Math.random().toString(36).substring(2,6).toUpperCase();
        document.getElementById('display-code').innerText = code;
        
        if(peer) peer.destroy();
        peer = new Peer("mamo-" + code.toLowerCase());
        
        peer.on('open', () => document.getElementById('host-status').innerText = "Aguardando amigo...");
        peer.on('connection', c => { conn = c; isHost = true; startMatch(); });
        peer.on('error', () => { alert("Erro ao criar sala. Tente outro código."); showP('panel-main'); });
    }

    function joinRoom() {
        const code = document.getElementById('room-input').value.trim().toLowerCase();
        if(!code) return;
        
        document.getElementById('join-status').innerText = "Conectando...";
        if(peer) peer.destroy();
        peer = new Peer();

        peer.on('open', () => {
            conn = peer.connect("mamo-" + code);
            conn.on('open', () => { isHost = false; startMatch(); });
            conn.on('error', () => document.getElementById('join-status').innerText = "Sala não encontrada.");
        });
    }

    function startMatch() {
        lobby.style.display = 'none';
        gameS.style.display = 'block';
        gameStarted = true;
        
        conn.on('data', d => {
            if(isHost) rInputs = d;
            else { gState = d; syncGame(); }
        });

        if(isHost) { resetPos(); runHostLoop(); }
        else runClientLoop();
    }

    // --- JOGO ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const WORLD_W = 2200, WORLD_H = 1300, GOAL = 280;
    
    let lInput = { x: 0, y: 0, k: false, r: 0 }, rInputs = { x: 0, y: 0, k: false, r: 0 }, gState = null;
    let p1 = { x: 400, y: 650, vx: 0, vy: 0 }, p2 = { x: 1800, y: 650, vx: 0, vy: 0 }, ball = { x: 1100, y: 650, vx: 0, vy: 0 };
    let score = { l: 0, r: 0 };

    function updateSize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', updateSize); updateSize();

    // Controles Touch
    const jCont = document.getElementById('joystick-container'), jKnob = document.getElementById('joystick-knob');
    const kBtn = document.getElementById('kick-btn');

    jCont.addEventListener('touchstart', touchMove, {passive: false});
    jCont.addEventListener('touchmove', touchMove, {passive: false});
    jCont.addEventListener('touchend', () => { lInput.x = 0; lInput.y = 0; jKnob.style.transform = 'translate(-50%, -50%)'; });
    kBtn.addEventListener('touchstart', (e) => { e.preventDefault(); lInput.k = true; });
    kBtn.addEventListener('touchend', (e) => { e.preventDefault(); lInput.k = false; });

    function touchMove(e) {
        e.preventDefault();
        const r = jCont.getBoundingClientRect(), cx = r.left + r.width/2, cy = r.top + r.height/2;
        const t = e.touches[0];
        let dx = t.clientX - cx, dy = t.clientY - cy, d = Math.sqrt(dx*dx+dy*dy), max = r.width/2;
        if(d > max) { dx *= max/d; dy *= max/d; }
        lInput.x = dx/max; lInput.y = dy/max; lInput.r = Math.atan2(dy, dx);
        jKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }

    // Rede
    setInterval(() => {
        if(!gameStarted || !conn || !conn.open) return;
        if(isHost) conn.send({ p1, p2, ball, score });
        else conn.send(lInput);
    }, 20);

    function syncGame() {
        if(!gState) return;
        p1.x = gState.p1.x; p1.y = gState.p1.y;
        p2.x = gState.p2.x; p2.y = gState.p2.y;
        ball.x = gState.ball.x; ball.y = gState.ball.y;
        document.getElementById('sL').innerText = gState.score.l.toString().padStart(2,'0');
        document.getElementById('sR').innerText = gState.score.r.toString().padStart(2,'0');
    }

    function resetPos() {
        p1.x = 400; p1.y = 650; p1.vx = p1.vy = 0;
        p2.x = 1800; p2.y = 650; p2.vx = p2.vy = 0;
        ball.x = 1100; ball.y = 650; ball.vx = ball.vy = 0;
    }

    function moveEnt(e, input) {
        e.vx += input.x * 0.55; e.vy += input.y * 0.55;
        e.x += e.vx; e.y += e.vy;
        e.vx *= 0.98; e.vy *= 0.98;
        // Bordas
        if(e.x < 35) e.x = 35; if(e.x > WORLD_W-35) e.x = WORLD_W-35;
        if(e.y < 35) e.y = 35; if(e.y > WORLD_H-35) e.y = WORLD_H-35;
        
        // Drible / Chute
        const dx = ball.x - e.x, dy = ball.y - e.y, dist = Math.sqrt(dx*dx+dy*dy);
        if(input.k && dist < 65) {
            ball.x = e.x + Math.cos(input.r) * 60;
            ball.y = e.y + Math.sin(input.r) * 60;
            ball.vx = e.vx; ball.vy = e.vy;
        } else if(dist < 52) {
            const ang = Math.atan2(dy, dx);
            ball.vx += Math.cos(ang) * 2; ball.vy += Math.sin(ang) * 2;
        }
    }

    function runHostLoop() {
        moveEnt(p1, lInput);
        moveEnt(p2, rInputs);
        ball.x += ball.vx; ball.y += ball.vy;
        ball.vx *= 0.99; ball.vy *= 0.99;

        // Gols
        if(ball.x < 20 && Math.abs(ball.y - 650) < 140) { score.r++; resetPos(); }
        if(ball.x > WORLD_W-20 && Math.abs(ball.y - 650) < 140) { score.l++; resetPos(); }
        // Parede bola
        if(ball.x < 20 || ball.x > WORLD_W-20) ball.vx *= -0.8;
        if(ball.y < 20 || ball.y > WORLD_H-20) ball.vy *= -0.8;

        draw();
        requestAnimationFrame(runHostLoop);
    }

    function runClientLoop() { draw(); requestAnimationFrame(runClientLoop); }

    function draw() {
        ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height);
        const me = isHost ? p1 : p2;
        const zoom = 0.65;
        ctx.scale(zoom, zoom);
        ctx.translate(-me.x + (canvas.width/2)/zoom, -me.y + (canvas.height/2)/zoom);

        // Campo
        ctx.fillStyle = '#1b5e20'; ctx.fillRect(0,0,WORLD_W, WORLD_H);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.strokeRect(0,0,WORLD_W, WORLD_H);
        ctx.beginPath(); ctx.moveTo(WORLD_W/2, 0); ctx.lineTo(WORLD_W/2, WORLD_H); ctx.stroke();
        
        // Players
        drawCirc(p1.x, p1.y, 35, '#42a5f5');
        drawCirc(p2.x, p2.y, 35, '#ef5350');
        drawCirc(ball.x, ball.y, 18, '#fff');
    }

    function drawCirc(x, y, r, c) {
        ctx.beginPath(); ctx.arc(x, y, r, 0, 7);
        ctx.fillStyle = c; ctx.fill(); ctx.stroke();
    }
</script>
</body>
</html>
